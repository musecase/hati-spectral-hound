name: Test HATI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    name: Python safety suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install HATI
        run: python -m pip install -e .
      - name: Run 44 safety and integration tests
        run: python -m unittest discover -s tests -v
      - name: Prove the controlled improvement gate
        run: >-
          python -m hati evaluate-improvement
          --config config/hati.example.json
          --cases sample_data/improvement_cases.json

  site:
    name: Judge site build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - run: npm run lint
      - run: npm run build
